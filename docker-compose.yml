services:
  xiaoer:
    build: .
    container_name: xiaoer-duel
    restart: unless-stopped
    ports:
      - "8765:8765"
    environment:
      - ZHIPUAI_API_KEY=${ZHIPUAI_API_KEY}
      - PORT=8765

